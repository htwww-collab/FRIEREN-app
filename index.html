<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>芙莉蓮：外匯鍊金編年史 PRO</title>
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --purple: #a78bfa;
            --gold: #fbbf24;
            --up: #ef4444; /* 升 (紅) */
            --down: #22c55e; /* 跌 (綠) */
        }

        body, html {
            margin: 0; padding: 0; background: #000; color: #f8fafc;
            font-family: 'PingFang TC', sans-serif; height: 100%; overflow: hidden;
        }

        .app-container {
            width: 100vw; height: 100vh; max-width: 450px; 
            background: var(--bg); display: flex; flex-direction: column;
        }

        /* 頂部狀態與人物 */
        .header {
            padding: 40px 15px 10px; background: var(--panel);
            border-bottom: 2px solid var(--purple);
        }

        .party { display: flex; gap: 10px; margin-bottom: 10px; }
        .char { font-size: 12px; background: rgba(167, 139, 250, 0.2); padding: 4px 8px; border-radius: 20px; border: 1px solid var(--purple); }

        .balance-area { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        .gold-count { color: var(--gold); font-size: 24px; font-weight: bold; font-family: monospace; }

        /* 武器市場 */
        .market { flex: 1; overflow-y: auto; padding: 10px; }
        .weapon-card {
            background: var(--panel); border: 1px solid #334155;
            border-radius: 12px; padding: 15px; margin-bottom: 10px;
            transition: 0.2s;
        }
        .weapon-card.selected { border-color: var(--gold); background: #334155; }
        
        .weapon-header { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 5px; }
        .weapon-icon { font-size: 20px; margin-right: 8px; }
        
        /* 簡易 K 線模擬圖 */
        .chart-mini {
            height: 40px; background: #0f172a; border-radius: 4px; 
            margin: 8px 0; display: flex; align-items: flex-end; gap: 2px; padding: 2px;
        }
        .k-bar { width: 4px; background: var(--up); border-radius: 1px; }

        /* 交易面板 */
        .trade-footer {
            background: var(--panel); padding: 15px; border-top: 1px solid #334155;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }

        .dialogue {
            background: rgba(0,0,0,0.4); border-left: 4px solid var(--purple);
            padding: 10px; font-size: 13px; color: var(--mana-blue); margin-bottom: 12px; height: 36px;
        }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn {
            border: none; border-radius: 8px; padding: 12px; font-weight: bold;
            font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .btn-buy { background: var(--up); color: white; }
        .btn-sell { background: var(--down); color: white; }
        .btn-book { background: #475569; color: var(--gold); grid-column: span 2; margin-top: 5px; }

        /* 魔法書彈窗 */
        .overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; padding: 40px 20px; z-index: 100;
        }
        .book-ui {
            border: 4px double var(--gold); padding: 20px; border-radius: 8px; flex: 1;
            background: #1e293b; overflow-y: auto;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="party">
            <div class="char">🧝‍♀️ 芙莉蓮</div>
            <div class="char">🪄 費倫</div>
            <div class="char">🛡️ 修塔爾克</div>
        </div>
        <div class="balance-area">
            <div><small>持有資金</small><br><span class="gold-count" id="gold">1000.00</span> <small>G</small></div>
            <div id="position-info" style="text-align: right; font-size: 12px; color: #94a3b8;">目前無持倉</div>
        </div>
    </div>

    <div class="market" id="weapon-list"></div>

    <div class="trade-footer">
        <div class="dialogue" id="talk">欣梅爾：只要踏出第一步，冒險就開始了。</div>
        <div class="controls">
            <button class="btn btn-buy" onclick="doTrade('BUY')">⚔️ 買入進攻</button>
            <button class="btn btn-sell" onclick="doTrade('SELL')">🛡️ 賣出結算</button>
            <button class="btn btn-book" onclick="toggleBook(true)">📖 弗蘭梅魔法書</button>
        </div>
    </div>

    <div class="overlay" id="book-overlay">
        <div class="book-ui">
            <h2 style="color:var(--gold); text-align:center;">📜 弗蘭梅的教誨</h2>
            <div id="book-content"></div>
            <button class="btn btn-book" onclick="toggleBook(false)">合上書本</button>
        </div>
    </div>
</div>

<script>
    let gold = 1000.00;
    let currentPos = null; // { id, buyPrice, amount }
    let selectedId = 'XAU';

    const weapons = [
        { id: 'XAU', name: '辛梅爾的追憶', symbol: '黃金', price: 2350.0, icon: '✨', history: [] },
        { id: 'XAG', name: '黑礦石法杖', symbol: '白銀', price: 28.5, icon: '🌑', history: [] },
        { id: 'JPY', name: '海塔的聖杯', symbol: '美日', price: 155.0, icon: '🍶', history: [] },
        { id: 'EUR', name: '贊恩的符文', symbol: '歐美', price: 1.085, icon: '🌿', history: [] }
    ];

    function init() {
        weapons.forEach(w => { for(let i=0; i<20; i++) w.history.push(Math.random() * 20 + 10); });
        tick();
        setInterval(tick, 2000);
    }

    function tick() {
        weapons.forEach(w => {
            const change = (Math.random() - 0.5) * (w.price * 0.004);
            w.price += change;
            w.history.push(Math.abs(change * 500));
            if(w.history.length > 25) w.history.shift();
        });
        render();
        updatePositionDisplay();
    }

    function render() {
        const list = document.getElementById('weapon-list');
        list.innerHTML = '';
        weapons.forEach(w => {
            const isSelected = selectedId === w.id;
            const card = document.createElement('div');
            card.className = `weapon-card ${isSelected ? 'selected' : ''}`;
            card.onclick = () => { selectedId = w.id; render(); };
            
            let kHtml = '';
            w.history.forEach(h => {
                kHtml += `<div class="k-bar" style="height:${h}px; background:${Math.random() > 0.5 ? 'var(--up)':'var(--down)'}"></div>`;
            });

            card.innerHTML = `
                <div class="weapon-header">
                    <span><span class="weapon-icon">${w.icon}</span>${w.name}</span>
                    <span style="font-family:monospace">${w.price.toFixed(w.id==='EUR'?4:2)}</span>
                </div>
                <div class="chart-mini">${kHtml}</div>
                <div style="font-size:10px; color:#64748b">即時市場波動：${w.symbol} / USD</div>
            `;
            list.appendChild(card);
        });
        document.getElementById('gold').innerText = gold.toFixed(2);
    }

    function doTrade(type) {
        const weapon = weapons.find(w => w.id === selectedId);
        if (type === 'BUY') {
            if (currentPos) { talk('FERN', '芙莉蓮大人，請先結算目前的武器再買新的。'); return; }
            currentPos = { id: selectedId, buyPrice: weapon.price, name: weapon.name };
            talk('HIMMEL', `這把 ${weapon.name} 就交給你了，去創造傳說吧！`);
        } else {
            if (!currentPos) { talk('STARK', '我...我還沒準備好武器，沒辦法結算啊！'); return; }
            const weaponNow = weapons.find(w => w.id === currentPos.id);
            const profit = (weaponNow.price - currentPos.buyPrice) * 1000;
            gold += profit;
            talk('FRIEREN', profit >= 0 ? `賺到了 ${profit.toFixed(2)} G，可以買甜點了。` : `虧損了 ${Math.abs(profit).toFixed(2)} G，真是麻煩。`);
            currentPos = null;
        }
        render();
    }

    function updatePositionDisplay() {
        const info = document.getElementById('position-info');
        if (currentPos) {
            const w = weapons.find(w => w.id === currentPos.id);
            const p = (w.price - currentPos.buyPrice) * 1000;
            info.innerHTML = `持有：${currentPos.name}<br>盈虧：<span style="color:${p>=0?'var(--up)':'var(--down)'}">${p.toFixed(2)} G</span>`;
        } else {
            info.innerText = '目前無持倉';
        }
    }

    function talk(who, text) {
        document.getElementById('talk').innerText = `${who}：${text}`;
    }

    function toggleBook(show) {
        const overlay = document.getElementById('book-overlay');
        overlay.style.display = show ? 'flex' : 'none';
        if (show) {
            const w = weapons.find(w => w.id === selectedId);
            const r1 = Math.random() > 0.5 ? "看漲" : "看跌";
            const r2 = Math.random() > 0.5 ? "牛市重啟" : "能量耗盡";
            document.getElementById('book-content').innerHTML = `
                <div style="margin-bottom:20px; border-bottom:1px solid #444; padding-bottom:10px;">
                    <h3 style="color:var(--purple)">${w.icon} ${w.name} 觀測</h3>
                    <p><b>短期建議：</b> 市場魔力流動顯示目前${r1}。建議在 5 分鐘內完成鍊金結算。</p>
                    <p><b>長期展望：</b> 此武器蘊含${r2}潛力，適合累積魔力。或是等待星辰到達正確位置時再出手。</p>
                </div>
                <p style="font-size:12px; color:#888;">*註：弗蘭梅曾說，市場就跟寶箱怪一樣，外表誘人，內裡危險。</p>
            `;
        }
    }

    init();
</script>
</body>
</html>
