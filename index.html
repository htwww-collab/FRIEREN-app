<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>芙莉蓮：異世界數據鍊金編年史 PRO V3.0</title>
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        /* 16:9 垂直 iPhone UI 風格，精緻像素術 */
        :root {
            --pixel-border-color: #3f3f4e; /* Distressed wood border style */
            --bg-color: #0d0d1a;
            --panel-bg: #1e1e2d;
            --purple: #bb9af7;
            --gold: #ff9e64;
            --green: #c3e88d;
            --red: #ff757f;
            --text-color: #cfc9c2;
            --mana-blue: #7dcfff;
        }

        /* 像素邊框模擬，Minecraft-like font */
        @font-face {
            font-family: 'PixelFont';
            src: url('https://fonts.cdnfonts.com/s/18928/Minecraftia.woff') format('woff');
        }

        body, html {
            margin: 0; padding: 0; background: #000; color: var(--text-color);
            font-family: 'PixelFont', 'Courier New', monospace; height: 100%; width: 100%;
            overflow: hidden; display: flex; justify-content: center;
        }

        /* 16:9 手機容器 */
        .iphone-container {
            width: 100vw; height: 177.78vw; /* 9:16 */
            max-width: 450px; max-height: 800px;
            background: var(--bg-color); border: 2px solid var(--pixel-border-color);
            display: flex; flex-direction: column; position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        /* 像素邊框樣式 */
        .pixel-border {
            border: 2px solid var(--pixel-border-color);
            border-image-slice: 2;
            border-image-source: linear-gradient(var(--pixel-border-color) 2px, transparent 2px), linear-gradient(90deg, var(--pixel-border-color) 2px, transparent 2px), linear-gradient(180deg, var(--pixel-border-color) 2px, transparent 2px), linear-gradient(270deg, var(--pixel-border-color) 2px, transparent 2px);
            border-image-width: 2;
            padding: 5px;
            background: rgba(0,0,0,0.2);
        }

        /* 頂部：勇者 HUD */
        .hud-header {
            padding: calc(10px + env(safe-area-inset-top)) 10px 5px;
            background: linear-gradient(180deg, #1f1f2e 0%, #16161e 100%);
            border-bottom: 2px solid var(--pixel-border-color);
        }

        .party-members { display: flex; gap: 8px; font-size: 10px; margin-bottom: 5px; }
        .member-hud { color: var(--text-color); display: flex; align-items: center; gap: 3px; }
        .member-hp { width: 40px; height: 6px; background: #333; border: 1px solid #666; border-radius: 2px; position: relative; }
        .hp-fill { position: absolute; left: 0; top: 0; height: 100%; background: var(--green); border-radius: 1px; }

        .balance-area { display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .gold-display { color: var(--gold); font-weight: bold; }

        /* 中央：詳細 K 線圖 */
        .detailed-chart-panel {
            padding: 10px; flex: 1; display: flex; flex-direction: column; gap: 10px;
        }

        .detailed-chart {
            height: 180px; background: rgba(0,0,0,0.3);
            border: 2px solid var(--pixel-border-color);
            position: relative; display: flex; flex-direction: column; overflow: hidden;
        }

        .chart-header { display: flex; justify-content: space-between; font-size: 11px; padding: 5px; border-bottom: 1px solid #333; }
        .chart-main { flex: 1; display: flex; align-items: flex-end; gap: 2px; padding: 2px 5px; position: relative; }
        .y-axis { position: absolute; left: 0; top: 0; bottom: 0; width: 40px; display: flex; flex-direction: column; justify-content: space-between; font-size: 8px; color: #888; padding: 5px 0; }
        .x-axis { position: absolute; left: 40px; bottom: 0; right: 0; height: 15px; display: flex; justify-content: space-between; font-size: 8px; color: #888; padding: 0 5px; }

        /* 修正：Mini-chart容器 */
        .chart-mini {
            height: 40px; background: rgba(0,0,0,0.3); border: 2px solid var(--pixel-border-color);
            margin: 5px 0; display: flex; align-items: flex-end; gap: 2px; padding: 2px 5px;
            overflow: hidden; /* 修正超出問題 */
        }

        /* 鍊金鋪 (武器庫) */
        .scroll-area {
            flex: 1; overflow-y: auto; padding: 10px;
            background: radial-gradient(circle at center, #1e1e2d 0%, #0d0d1a 100%);
        }

        .weapon-card {
            background: var(--panel-bg); border: 2px solid var(--pixel-border-color);
            border-radius: 5px; padding: 10px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .weapon-info { display: flex; flex-direction: column; }
        .weapon-name { font-weight: bold; color: var(--gold); margin-bottom: 3px; font-size: 14px; }
        .weapon-price-area { display: flex; align-items: center; gap: 5px; }

        /* 底部對話框 */
        .footer-ui {
            background: #16161e; padding: 15px; border-top: 2px solid var(--pixel-border-color);
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }

        .dialogue-box {
            background: #000; border: 2px solid var(--mana-blue); padding: 10px; border-radius: 4px;
            font-size: 12px; height: 40px; margin-bottom: 10px;
            display: flex; align-items: center; color: var(--mana-blue);
        }

        .dialogue-box::before { content: "角色建議："; color: var(--purple); font-weight: bold; }

        .btn-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn {
            border: none; border-radius: 4px; padding: 12px; font-weight: bold;
            font-family: inherit; font-size: 14px; cursor: pointer;
        }
        .btn-grimoire { background: var(--gold); color: #000; width: 100%; padding: 10px; }
        .btn-attack { background: var(--purple); color: #fff; width: 100%; padding: 10px; }

        /* 弗蘭梅魔法書彈窗 */
        .overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.85);
            display: none; flex-direction: column; padding: 30px; z-index: 100;
        }
        .book-content {
            background: #2d2d39; border: 4px double var(--gold); padding: 20px; border-radius: 10px; flex: 1;
        }

    </style>
</head>
<body>

<div class="iphone-container">
    <div class="hud-header">
        <div class="party-members">
            <div class="member-hud">🧙‍♀️ <div class="member-hp"><div class="hp-fill" style="width:100%"></div></div></div>
            <div class="member-hud">🔮 <div class="member-hp"><div class="hp-fill" style="width:100%"></div></div></div>
            <div class="member-hud">🛡️ <div class="member-hp"><div class="hp-fill" style="width:100%"></div></div></div>
        </div>
        <div class="balance-area">
            <div>💰 虛擬金幣: <span id="gold-bal" class="gold-display">1000.00</span> G</div>
            <div style="font-size: 10px;">勇者進度: <span style="color:var(--gold)">異界編年史</span></div>
        </div>
    </div>

    <div class="detailed-chart-panel">
        <div class="detailed-chart pixel-border">
            <div class="chart-header">
                <div>✨ 詳細 3 分鐘 K 線圖 (辛梅爾的追憶)</div>
                <div id="chart-price-axis" class="y-axis"></div>
                <div id="chart-time-axis" class="x-axis"></div>
            </div>
            <div id="main-candlestick-chart" class="chart-main">
                </div>
        </div>
    </div>

    <div class="scroll-area" id="weapon-list">
        </div>

    <div class="footer-ui">
        <div id="dialogue-box" class="dialogue-box">
            芙莉蓮：市場出現了未知的數據魔力流動，去鍊金鋪看看有什麼強力的武器吧。
        </div>
        <div class="btn-panel">
            <button class="btn btn-grimoire" onclick="toggleBook()">📖 弗蘭梅魔法書</button>
            <button class="btn btn-attack" onclick="doAttack()">⚔️ 地下城攻堅 (交易)</button>
        </div>
    </div>

    <div id="grimoire-overlay" class="overlay">
        <div class="book-content">
            <h2 style="color:var(--gold); text-align:center;">📜 弗蘭梅魔法書</h2>
            <div id="book-analysis" style="line-height: 1.6; font-size: 12px; color: #ccc;">
                市場分析魔力流動中...
            </div>
            <button class="btn btn-grimoire" style="margin-top:20px; width:100%" onclick="toggleBook()">關閉魔法書</button>
        </div>
    </div>
</div>

<script>
    // 1. 遊戲數據結構
    let goldBal = 1000.00;
    let selectedWeaponId = 'XAU';
    let currentPosition = null;

    // OCHL數據 (開盤, 收盤, 最高, 最低)，每個條 15 秒，3分鐘=12個條
    const ochlData = {
        'XAU': { history: [], lastClose: 2350.15, nextUpdate: 15 },
        'XAG': { history: [], lastClose: 28.40, nextUpdate: 15 },
        'JPY': { history: [], lastClose: 151.20, nextUpdate: 15 },
        'EUR': { history: [], lastClose: 1.0855, nextUpdate: 15 }
    };

    const weapons = [
        { id: 'XAU', name: '辛梅爾的追憶 (黃金)', symbol: 'XAU/USD', price: 2350.15, trend: 0 },
        { id: 'XAG', name: '黑礦石法杖 (白銀)', symbol: 'XAG/USD', price: 28.40, trend: 0 },
        { id: 'JPY', name: '海塔的聖杯 (美日)', symbol: 'USD/JPY', price: 151.20, trend: 0 },
        { id: 'EUR', name: '贊恩的符文 (歐美)', symbol: 'EUR/USD', price: 1.0855, trend: 0 }
    ];

    const companions = [
        { id: 'FRIEREN', name: '芙莉蓮', ad: "市場就像寶箱怪一樣危險，不要買奇怪的魔導書喔。" },
        { id: 'FERN', name: '費倫', ad: "芙莉蓮大人，請注意風險控管，不要過度鍊金。" },
        { id: 'STARK', name: '修塔爾克', ad: "嗚啊！價格跌得好快！我們要逃跑嗎？" }
    ];

    // 2. 模擬行情 (1 秒一次)
    setInterval(() => {
        weapons.forEach(w => {
            const ochl = ochlData[w.id];
            ochl.nextUpdate--;

            // 每 15 秒更新一個 OCHL 條
            if (ochl.nextUpdate === 0) {
                const change = (Math.random() - 0.5) * (w.price * 0.005);
                const close = w.price + change;
                const high = Math.max(w.price, close) + Math.random() * 0.002 * w.price;
                const low = Math.min(w.price, close) - Math.random() * 0.002 * w.price;

                ochl.history.push({ o: w.price, c: close, h: high, l: low });
                if (ochl.history.length > 12) ochl.history.shift(); // 3 分鐘

                w.price = close;
                w.trend = change;
                ochl.nextUpdate = 15;
            }
        });
        renderAll();
    }, 1000);

    // 3. 全局渲染
    function renderAll() {
        document.getElementById('gold-bal').innerText = goldBal.toFixed(2);
        renderCandlestickChart();
        renderWeaponList();
        updateGuide();
    }

    // 4. 渲染中央詳細 3 分鐘 K 線圖 (像素蠟燭圖)
    function renderCandlestickChart() {
        const chartEl = document.getElementById('main-candlestick-chart');
        const priceAxisEl = document.getElementById('chart-price-axis');
        const timeAxisEl = document.getElementById('chart-time-axis');
        
        const currentOCHL = ochlData[selectedWeaponId];
        const data = currentOCHL.history;
        
        // 如果無數據
        if (data.length === 0) {
            chartEl.innerHTML = '<div style="flex:1; display:flex; align-items:center; justify-content:center; font-size:10px;">市場觀測中...</div>';
            return;
        }

        // 計算 Y 軸價格範圍
        const prices = data.flatMap(d => [d.o, d.c, d.h, d.l]);
        const minP = Math.min(...prices) * 0.9995;
        const maxP = Math.max(...prices) * 1.0005;
        const priceDiff = maxP - minP;

        // 渲染 Y 軸價格軸
        priceAxisEl.innerHTML = `
            <div>${maxP.toFixed(2)}</div>
            <div>${(minP + priceDiff/2).toFixed(2)}</div>
            <div>${minP.toFixed(2)}</div>
        `;

        // 渲染 X 軸時間軸 (模擬，清晰標記時間)
        timeAxisEl.innerHTML = `
            <div>3 分鐘前</div>
            <div>2 分鐘前</div>
            <div>1 分鐘前</div>
            <div>現在</div>
        `;

        // 渲染像素蠟燭圖
        chartEl.innerHTML = '';
        data.forEach(d => {
            const candle = document.createElement('div');
            candle.style.cssText = `flex:1; height:100%; position:relative; display:flex; align-items:flex-end; padding: 0 1px;`;
            
            const color = d.c >= d.o ? 'var(--green)' : 'var(--red)';
            const topOpen = ((d.o - minP) / priceDiff) * 100;
            const topClose = ((d.c - minP) / priceDiff) * 100;
            const topHigh = ((d.h - minP) / priceDiff) * 100;
            const topLow = ((d.l - minP) / priceDiff) * 100;

            const bodyHeight = Math.abs(topClose - topOpen);
            const bodyBottom = Math.min(topOpen, topClose);

            const highH = topHigh - Math.max(topOpen, topClose);
            const highBottom = Math.max(topOpen, topClose);

            const lowH = Math.min(topOpen, topClose) - topLow;
            const lowBottom = topLow;

            candle.innerHTML = `
                <div style="position:absolute; left:calc(50% - 0.5px); bottom:${lowBottom}%; height:${lowH}%; width:1px; background:${color};"></div>
                <div style="position:absolute; left:calc(50% - 0.5px); bottom:${highBottom}%; height:${highH}%; width:1px; background:${color};"></div>
                <div style="position:absolute; left:calc(50% - 2.5px); bottom:${bodyBottom}%; height:max(${bodyHeight}%, 1px); width:5px; background:${color}; border:max(1px, ${bodyHeight}*0.1) solid ${color};"></div>
            `;
            chartEl.appendChild(candle);
        });
    }

    // 5. 渲染鍊金鋪武器清單卡片 (含 Mini-chart 和交易按鈕)
    function renderWeaponList() {
        const listEl = document.getElementById('weapon-list');
        listEl.innerHTML = '';

        weapons.forEach(w => {
            const ochl = ochlData[w.id];
            const data = ochl.history;
            const card = document.createElement('div');
            card.className = `weapon-card ${w.id === selectedWeaponId ? 'selected' : ''}`;
            card.onclick = () => { selectedWeaponId = w.id; renderAll(); };

            // 計算當前盈虧 (如果持倉)
            let profitHtml = '';
            if (currentPosition && currentPosition.id === w.id) {
                const profit = (w.price - currentPosition.buyPrice) * 1000;
                const color = profit >= 0 ? 'var(--green)' : 'var(--red)';
                profitHtml = `<span style="font-size:10px; color:${color}; font-weight:bold;"> 持倉盈虧: ${profit.toFixed(2)} G</span>`;
            }

            // 修正后的Mini-chart渲染
            let kHtml = '';
            if (data.length > 0) {
                const prices = data.flatMap(d => [d.o, d.c, d.h, d.l]);
                const minP = Math.min(...prices);
                const maxP = Math.max(...prices);
                const priceDiff = maxP - minP;

                data.forEach(d => {
                    const color = d.c >= d.o ? 'var(--green)' : 'var(--red)';
                    const topHigh = ((d.h - minP) / priceDiff) * 100;
                    const topLow = ((d.l - minP) / priceDiff) * 100;
                    const highBottom = ((d.h - minP) / priceDiff) * 100;
                    const lowBottom = ((d.l - minP) / priceDiff) * 100;
                    
                    kHtml += `<div style="flex:1; height:100%; position:relative; overflow:hidden;">
                                <div style="position:absolute; left:calc(50% - 1.5px); bottom:${lowBottom}%; height:${Math.max(topHigh - topLow, 1)}%; width:3px; background:${color};"></div>
                              </div>`;
                });
            } else {
                kHtml = '<div style="flex:1; font-size:8px; display:flex; align-items:center; justify-content:center;">行情數據收集中...</div>';
            }

            card.innerHTML = `
                <div class="weapon-info">
                    <div class="weapon-name">${w.name}</div>
                    <div style="font-size:10px; color:#888;">${w.symbol} / USD ${profitHtml}</div>
                    <div class="weapon-price-area">
                        <span style="font-family:monospace; font-size:16px;">${w.price.toFixed(w.id==='EUR'?4:2)}</span>
                        <span style="color:${w.trend>=0?'var(--green)':'var(--red)'}">${w.trend>=0?'▲':'▼'}</span>
                    </div>
                </div>
                <div class="chart-mini pixel-border">${kHtml}</div>
            `;
            listEl.appendChild(card);
        });
    }

    // 6. 核心交易邏輯
    function doAttack() {
        const weapon = weapons.find(w => w.id === selectedWeaponId);
        if (currentPosition) {
            // 賣出結算
            const profit = (weapon.price - currentPosition.buyPrice) * 1000;
            goldBal += profit;
            updateGuide(`對地下城魔族發起突襲 (賣出)！鍊金結算盈虧：${profit.toFixed(2)} G。`);
            currentPosition = null;
        } else {
            // 買入進攻
            currentPosition = { id: selectedWeaponId, buyPrice: weapon.price, name: weapon.name };
            updateGuide(`消耗資金買入 ${weapon.name}，發起異界攻堅 (建立倉位)。持倉成本：${weapon.price.toFixed(4)} G。`);
        }
        renderAll();
    }

    // 7. 魔法書與對話
    function toggleBook() {
        const g = document.getElementById('grimoire-overlay');
        const show = g.style.display === 'none';
        g.style.display = show ? 'flex' : 'none';
        
        if (show) generateAnalysis();
    }

    function generateAnalysis() {
        const weapon = weapons.find(w => w.id === selectedWeaponId);
        const rand短期 = companions[Math.floor(Math.random() * companions.length)];
        const rand長期 = companions[Math.floor(Math.random() * companions.length)];
        const短期ad = rand短期.ad;
        const長期ad = rand長期.ad;

        document.getElementById('book-analysis').innerHTML = `
            <div>📜 對 ${weapon.name} 的數據鍊金觀測：</div>
            <div>[短期建議 (${rand短期.name})]：此武器當前數據魔力出現未知的 ${selectedWeaponId === 'XAU' ? "黃金爆發" : "歐元震盪"} 跡象。費倫警告：${rand短期.ad}。建議在 3 分鐘內作出決斷。</div>
            <div>[長期展望 (${rand長期.name})]：弗蘭梅曾言，數據編年史雖有起落，但長期來看，此媒介蘊含 ${selectedWeaponId === 'XAG' ? "日圓牛市重啟" : "美日混沌森林符文"} 潛力。修塔爾克：${rand長期.ad}。或可長期持有，等待星辰流轉時出手。</div>
        `;
    }

    function updateGuide(text) {
        if (text) {
            document.getElementById('dialogue-box').innerText = text;
        } else {
            // 定期更新隨機對話
            if (Math.random() > 0.9) {
                const companion = companions[Math.floor(Math.random() * companions.length)];
                document.getElementById('dialogue-box').innerText = `${companion.name}：${companion.ad}`;
            }
        }
    }

    // 初始化
    renderAll();

</script>
</body>
</html>
